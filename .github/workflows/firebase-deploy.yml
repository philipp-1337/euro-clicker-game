name: Build & Deploy to Firebase Hosting (React)

on:
  push:
    branches:
      - '**'
  workflow_dispatch: # Optional: manuell auslösbar

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Project
        run: bun run build

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@v13.9.0
        with:
          args: >-
            ${{ github.ref == 'refs/heads/main' 
              && 'deploy --only hosting:production' 
              || format('hosting:channel:deploy alpha-{0} --only production', github.ref_name) 
            }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}